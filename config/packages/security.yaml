security:
    providers:
        in_memory:
            memory:
                users:
                    # Pre-seeded demo user — lets the chaos scenario nuke and
                    # then re-hydrate the security token storage. Plaintext
                    # hasher is ONLY acceptable because this is a local demo
                    # app and the credentials never leave the box.
                    admin:
                        password: admin
                        roles: ['ROLE_ADMIN']
    password_hashers:
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            # The demo firewall is intentionally permissive: no required
            # entry point, no access control, no CSRF protection. The chaos
            # scenario's POST endpoints need to accept plain JSON bodies
            # without a session token dance, and the live observation
            # stream needs same-origin GET access to the daemon proxy.
            # This shape is demo-only — do NOT copy to production.
            lazy: true
            provider: in_memory
            stateless: false
