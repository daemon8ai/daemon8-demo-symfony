security:
    providers:
        in_memory:
            memory:
                users:
                    admin:
                        password: admin
                        roles: ['ROLE_ADMIN']
    password_hashers:
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: in_memory
            http_basic:
                realm: 'demo'
